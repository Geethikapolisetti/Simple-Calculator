<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Calculator</title>

<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --btn: #334155;
  --accent: #38bdf8;
  --text: #e2e8f0;
  --display-bg: #000000;
  --display-text: #00ff00;
}

.light {
  --bg: #f1f5f9;
  --panel: #ffffff;
  --btn: #e2e8f0;
  --accent: #0ea5e9;
  --text: #0f172a;
  --display-bg: #e2e8f0;
  --display-text: #0f172a;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.calculator {
  width: 360px;
  background: var(--panel);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  color: var(--text);
}

.display {
  background: var(--display-bg);
  color: var(--display-text);
  padding: 15px;
  border-radius: 10px;
  text-align: right;
  font-size: 24px;
  margin-bottom: 10px;
  min-height: 40px;
  overflow-x: auto;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: var(--btn);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: var(--accent);
  color: black;
}

.equal {
  background: #22c55e;
  color: black;
}

.history {
  margin-top: 10px;
  font-size: 13px;
  max-height: 80px;
  overflow-y: auto;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="calculator">
  
  <div class="topbar">
    <strong>Pro Calculator</strong>
    <button onclick="calc.toggleTheme()">🌙</button>
  </div>

  <div id="display" class="display">0</div>

  <div class="buttons">
    <button onclick="calc.clear()">C</button>
    <button onclick="calc.input('(')">(</button>
    <button onclick="calc.input(')')">)</button>
    <button onclick="calc.input('/')">÷</button>
    <button onclick="calc.input('sqrt(')">√</button>

    <button onclick="calc.input('7')">7</button>
    <button onclick="calc.input('8')">8</button>
    <button onclick="calc.input('9')">9</button>
    <button onclick="calc.input('*')">×</button>
    <button onclick="calc.input('^')">^</button>

    <button onclick="calc.input('4')">4</button>
    <button onclick="calc.input('5')">5</button>
    <button onclick="calc.input('6')">6</button>
    <button onclick="calc.input('-')">−</button>
    <button onclick="calc.input('log(')">log</button>

    <button onclick="calc.input('1')">1</button>
    <button onclick="calc.input('2')">2</button>
    <button onclick="calc.input('3')">3</button>
    <button onclick="calc.input('+')">+</button>
    <button onclick="calc.input('sin(')">sin</button>

    <button onclick="calc.input('0')">0</button>
    <button onclick="calc.input('.')">.</button>
    <button onclick="calc.backspace()">⌫</button>
    <button class="equal" onclick="calc.evaluate()">=</button>
    <button onclick="calc.input('cos(')">cos</button>
  </div>

  <div id="history" class="history"></div>
</div>

<script>
class Calculator {
  constructor() {
    this.display = document.getElementById("display");
    this.historyDiv = document.getElementById("history");
    this.expression = "";
    this.loadHistory();
    this.loadTheme();
  }

  input(val) {
    this.expression += val;
    this.update();
  }

  clear() {
    this.expression = "";
    this.update();
  }

  backspace() {
    this.expression = this.expression.slice(0, -1);
    this.update();
  }

  update() {
    this.display.innerText = this.expression || "0";
  }

  evaluate() {
    try {
      let result = this.safeEval(this.expression);
      this.addHistory(this.expression + " = " + result);
      this.expression = result.toString();
      this.update();
    } catch {
      this.display.innerText = "Error";
    }
  }

  safeEval(expr) {
    expr = expr.replace(/\^/g, "**");
    expr = expr.replace(/sin\(/g, "Math.sin(")
               .replace(/cos\(/g, "Math.cos(")
               .replace(/log\(/g, "Math.log10(")
               .replace(/sqrt\(/g, "Math.sqrt(");
    return Function("return " + expr)();
  }

  addHistory(entry) {
    let div = document.createElement("div");
    div.innerText = entry;
    this.historyDiv.prepend(div);
    let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
    history.unshift(entry);
    localStorage.setItem("calcHistory", JSON.stringify(history.slice(0, 10)));
  }

  loadHistory() {
    let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
    history.forEach(h => {
      let div = document.createElement("div");
      div.innerText = h;
      this.historyDiv.appendChild(div);
    });
  }

  toggleTheme() {
    document.body.classList.toggle("light");
    const isLight = document.body.classList.contains("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");
  }

  loadTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "light") {
      document.body.classList.add("light");
    }
  }
}

const calc = new Calculator();

document.addEventListener("keydown", (e) => {
  if ("0123456789+-*/().".includes(e.key)) calc.input(e.key);
  else if (e.key === "Enter") calc.evaluate();
  else if (e.key === "Backspace") calc.backspace();
});
</script>

</body>
</html>
